
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Xitique Xanga</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/951/951971.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/951/951971.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      // Tailwin config inside HTML for simplicity in this setup
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0fdfa',
                100: '#ccfbf1',
                500: '#14b8a6', // Teal-500
                600: '#0d9488', // Teal-600
                900: '#134e4a', // Teal-900
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 32px 32px;
        -webkit-tap-highlight-color: transparent;
      }
      /* Dark mode background override */
      html.dark body {
        background-color: #0f172a;
        background-image: radial-gradient(#1e293b 1px, transparent 1px);
        color: #f1f5f9;
      }
      /* Custom Scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      /* Hide scrollbar for clean UI in specific containers */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
    </style>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
