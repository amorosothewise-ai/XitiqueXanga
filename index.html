
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Xitique Xanga</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/951/951971.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/951/951971.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      // Polyfill for global
      window.global = window;
      
      // Safe process polyfill that won't be clobbered by Vite's define replacement
      window['process'] = window['process'] || {};
      window['process']['env'] = window['process']['env'] || {};

      // Global error handler to catch initialization errors
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("Global Error Caught: ", message, " at ", source, ":", lineno);
        const root = document.getElementById('root');
        // Only show error if app hasn't loaded yet (still showing loading text)
        if (root && (root.innerText.includes('Carregando') || root.innerHTML === '')) {
          root.innerHTML = '<div style="padding: 40px; text-align: center; font-family: sans-serif; background: white; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">' +
            '<div style="background: #fff1f2; padding: 32px; border-radius: 24px; border: 1px solid #fecdd3; max-width: 400px; width: 100%; shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);">' +
            '<h2 style="color: #e11d48; font-size: 20px; font-weight: 700; margin-bottom: 12px;">Erro de Inicialização</h2>' +
            '<p style="color: #64748b; font-size: 14px; line-height: 1.5; margin-bottom: 24px;">' + message + '</p>' +
            '<button onclick="window.location.reload()" style="width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s;">Recarregar Aplicação</button>' +
            '</div>' +
            '</div>';
        }
      };

      // Catch resource errors (like script 404s)
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT') {
          window.onerror("Falha ao carregar componente crítico: " + e.target.src.split('/').pop());
        }
      }, true);

      // Tailwin config inside HTML for simplicity in this setup
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0fdfa',
                100: '#ccfbf1',
                500: '#14b8a6', // Teal-500
                600: '#0d9488', // Teal-600
                900: '#134e4a', // Teal-900
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 32px 32px;
        -webkit-tap-highlight-color: transparent;
      }
      /* Dark mode background override */
      html.dark body {
        background-color: #0f172a;
        background-image: radial-gradient(#1e293b 1px, transparent 1px);
        color: #f1f5f9;
      }
      /* Custom Scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      /* Hide scrollbar for clean UI in specific containers */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
    </style>

</head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafc; font-family: sans-serif;">
        <div class="loading-spinner"></div>
        <h2 style="margin-top: 24px; font-size: 18px; font-weight: 600; color: #1e293b; font-family: sans-serif;">Xitique Xanga</h2>
        <p style="margin-top: 8px; font-size: 14px; color: #64748b; font-family: sans-serif;">Carregando aplicação...</p>
      </div>
    </div>
    <style>
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #14b8a6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
